<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teraps GTPS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
    header {
      padding: 20px;
      text-align: center;
      background: rgba(2,6,23,0.8);
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: #38bdf8;
    }
    nav a {
      margin: 0 10px;
      color: white;
      text-decoration: none;
    }
    .hero {
      text-align: center;
      padding: 100px 20px;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #38bdf8;
      border-radius: 10px;
      color: black;
      text-decoration: none;
      display: inline-block;
    }
    .section {
      padding: 60px 20px;
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
    }
    .card {
      background: rgba(2,6,23,0.8);
      padding: 20px;
      border-radius: 15px;
    }
    .online { color: #22c55e; }
    .offline { color: #ef4444; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<header>
  <h1>TERAPS GTPS</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#features">Fitur</a>
    <a href="#shop">Shop</a>
  </nav>
</header>

<section class="hero">
  <h2>Server GTPS Terbaik 🔥</h2>
  <div id="status">Checking...</div>
  <div id="players">Players: 0</div>
  <a href="#" class="btn">Download APK</a>
</section>

<section class="section">
  <h2>Fitur</h2>
  <div class="grid">
    <div class="card">💎 8 Item Gratis</div>
    <div class="card">⚡ Fast Grow</div>
    <div class="card">🎉 Event</div>
  </div>
</section>

<section class="section">
  <h2>Shop</h2>
  <div class="grid">
    <div class="card">💰 Diamond</div>
    <div class="card">🎁 Mystery Box</div>
  </div>
</section>

<script>
document.getElementById("status").innerHTML = "Status: <span class='online'>ONLINE</span>";

setInterval(()=>{
  document.getElementById("players").innerText = "Players: " + Math.floor(Math.random()*200+50);
},2000);

// particles
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<50;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()-0.5,vy:Math.random()-0.5});
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#38bdf8";
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    ctx.fillRect(p.x,p.y,2,2);
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
