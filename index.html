<!DOCTYPE html>

<head>

<title>Teraps GTPS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0615;
  color: white;
}

/* HEADER */
header {
  background: #120a24;
  padding: 15px;
  text-align: center;
  border-bottom: 1px solid #2e1a47;
}

header h1 {
  margin: 0;
  color: #c084fc;
}

/* HERO */
.hero {
  text-align: center;
  padding: 70px 20px;
}

.hero h2 {
  margin-bottom: 10px;
}

.hero p {
  color: #b8a6d9;
}

/* ONLINE BOX */
.online-box {
  margin: 20px auto;
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid #a855f7;
  border-radius: 8px;
  color: #c084fc;
  background: rgba(168,85,247,0.1);
  box-shadow: 0 0 10px #a855f7;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  background: #1a1033;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  border: 1px solid #3b1e66;
  transition: 0.3s;
}

.btn:hover {
  background: #a855f7;
  color: white;
  box-shadow: 0 0 15px #a855f7;
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

/* GRID ITEM */
.item-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
  max-width: 700px;
  margin: auto;
}

/* ITEM BOX */
.item {
  background: #120a24;
  border: 1px solid #2e1a47;
  border-radius: 10px;
  padding: 15px;
  transition: 0.3s;
}

.item:hover {
  border-color: #a855f7;
  box-shadow: 0 0 12px #a855f7;
  transform: scale(1.05);
}

.item img {
  width: 70px;
  height: 70px;
  object-fit: contain;
  margin-bottom: 8px;
}

.item p {
  margin: 0;
  font-size: 13px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #9f7aea;
  border-top: 1px solid #2e1a47;
}
</style>
</head>

    <div class="item"><img src="item2.png"><p>Item 2</p></div>
    <div class="item"><img src="item3.png"><p>Item 3</p></div>

<footer>
  © 2026 Teraps GTPS

<script>
function updatePlayers() {
  let base = 60;

  document.getElementById("playerCount").textContent = base + random;
}
setInterval(updatePlayers, 5000);
</script>

</body>
